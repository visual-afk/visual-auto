name: HandSOS 성과 수집

on:
  schedule:
    # 매일 06:00 KST (전날 21:00 UTC) — 어제치 수집
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '특정일 수집 (YYYY-MM-DD, 비우면 어제)'
        required: false
        type: string
      backfill_start:
        description: '백필 시작일 (YYYY-MM-DD, backfill_end와 함께)'
        required: false
        type: string
      backfill_end:
        description: '백필 종료일 (YYYY-MM-DD)'
        required: false
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: visual-auto-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: visual-auto-web/package-lock.json

      - run: npm ci

      - name: HandSOS 수집
        run: |
          if [ -n "${{ github.event.inputs.backfill_start }}" ] && [ -n "${{ github.event.inputs.backfill_end }}" ]; then
            npx tsx scripts/crawl-handsos.ts --backfill "${{ github.event.inputs.backfill_start }}" "${{ github.event.inputs.backfill_end }}"
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            npx tsx scripts/crawl-handsos.ts --date "${{ github.event.inputs.date }}"
          else
            npx tsx scripts/crawl-handsos.ts
          fi
        env:
          HANDSOS_PW: ${{ secrets.HANDSOS_PW }}
          HANDSOS_COMPANY_ID: ${{ secrets.HANDSOS_COMPANY_ID }}
          HANDSOS_USER_ID: ${{ secrets.HANDSOS_USER_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
