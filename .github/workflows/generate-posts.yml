name: AI 블로그 글 생성

on:
  schedule:
    - cron: '0 23 * * 0,2,4' # 월/수/금 08:00 KST (전날 23:00 UTC)
  workflow_dispatch:
    inputs:
      topic:
        description: '특정 주제 지정 (선택사항)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 블로그 글 생성
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            npx tsx scripts/generate-blog-post.ts --topic "${{ github.event.inputs.topic }}"
          else
            npx tsx scripts/generate-blog-post.ts
          fi
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_DOCS_FOLDER_ID: ${{ secrets.GOOGLE_DOCS_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 파이프라인 로그 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status/pipeline-log.jsonl
          git diff --cached --quiet || git commit -m "chore: update pipeline log"
          git push
