name: AI 블로그 글 생성

on:
  schedule:
    # 월/수/금 새벽 3시 KST (전날 18:00 UTC) — 1차 실행
    - cron: '0 18 * * 0,2,4'
    # 월/수/금 새벽 4시 KST (전날 19:00 UTC) — 1차 실패 시 재시도
    - cron: '0 19 * * 0,2,4'
    # 월/수/금 새벽 5시 KST (전날 20:00 UTC) — 2차 실패 시 재시도
    - cron: '0 20 * * 0,2,4'
  workflow_dispatch:
    inputs:
      topic:
        description: '특정 주제 지정 (선택사항)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 블로그 글 생성
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            npx tsx scripts/generate-blog-post.ts --topic "${{ github.event.inputs.topic }}"
          else
            npx tsx scripts/generate-blog-post.ts
          fi
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_DOCS_FOLDER_ID: ${{ secrets.GOOGLE_DOCS_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 파이프라인 로그 커밋
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add status/pipeline-log.jsonl
          git diff --cached --quiet || git commit -m "chore: update pipeline log"
          git push
