name: deploy-web

# main에 visual-auto-web 변경이 머지되면 Vercel 프로덕션에 자동 배포한다.
# (Vercel이 GitHub에 직접 연결돼 있지 않아 이 워크플로가 배포를 담당한다)
on:
  push:
    branches: [main]
    paths:
      - 'visual-auto-web/**'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visual-auto-web
    env:
      VERCEL_ORG_ID: team_Au7w5Gh6BZvOx6NF79uvKusm
      VERCEL_PROJECT_ID: prj_efzxzX92nPzPUWbdmodaTG61Ujv8
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
